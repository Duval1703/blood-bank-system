services:
  - type: web
    name: blood-bank-system
    runtime: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader --no-interaction
      npm ci
      npm run build
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: |
      php artisan migrate --force
      php artisan db:seed --force --class=EstablishmentSeeder
      php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: Blood Bank Management System
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: DB_CONNECTION
        value: pgsql
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bloodbank-db
          property: connectionString

databases:
  - name: bloodbank-db
    plan: free
    databaseName: bloodbank
    user: bloodbank
    region: oregon
